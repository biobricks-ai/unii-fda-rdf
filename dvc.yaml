stages:
  build:
    cmd: uv run biobricks pull && uv run python stages/convert.py
    deps: [.bb/dependencies.txt, stages/convert.py]
    outs: [brick/unii-fda-rdf.nt]
    metrics:
      - reports/source-coverage.json:
          cache: false
      - reports/ontology-health.json:
          cache: false
